Telescope:
  - device_name: telescope_observatoryname
    ip: localhost
    device_number: 0
    pointing_threshold: 0.06 # arcmins
    guider: # set by the user using calibrate_guiding sequence
      PIX2TIME:
        "+x": 69.32860207831231
        "-x": 69.05795081331794
        "+y": 69.32860207831231
        "-y": 69.32860207831231
      RA_AXIS: "y"
      DIRECTIONS:
        "+x": North
        "-x": South
        "+y": East
        "-y": West
      PID_COEFFS:
        "x": { "p": 0.70, "i": 0.02, "d": 0.0 }
        "y": { "p": 0.50, "i": 0.02, "d": 0.0 }
        "set_x": 0.0
        "set_y": 0.0
Focuser:
  - device_name: focuser_observatoryname
    ip: localhost
    device_number: 0
Camera:
  - device_name: camera_observatoryname
    ip: localhost
    device_number: 0
    temperature: -60
    temperature_tolerance: 1
    flats:
      target_adu: [31500, 10500]
      bias_offset: 300
      lower_exptime_limit: 6
      upper_exptime_limit: 60
    paired_devices:
      Telescope: telescope_observatoryname
      Focuser: focuser_observatoryname
      Dome: dome_observatoryname
      FilterWheel: fw_observatoryname
      ObservingConditions: weather_observatoryname
      SafetyMonitor: safety_observatoryname
Dome:
  - device_name: dome_observatoryname
    ip: localhost
    device_number: 0
FilterWheel:
  - device_name: fw_observatoryname
    ip: localhost
    device_number: 0
ObservingConditions:
  - device_name: weather_observatoryname
    ip: localhost
    device_number: 0
    closing_limits:
      Humidity:
        - upper: 70
          max_safe_duration: 30
        - upper: 80
          max_safe_duration: 150
        - upper: 90
          max_safe_duration: 300
      Temperature:
        - lower: 0
          max_safe_duration: 30
        - lower: -5
          max_safe_duration: 150
      WindSpeed:
        - upper: 10
          max_safe_duration: 30
      SkyTemperature:
        - upper: -30
          max_safe_duration: 30
        - upper: -20
          max_safe_duration: 150
      SkyBrightness:
        - upper: 1000
          max_safe_duration: 30
SafetyMonitor:
  - device_name: safety_observatoryname
    ip: localhost
    device_number: 0
    max_safe_duration: 30

Misc:
  # Webcam: http://localhost:8888/inside # hls stream, see https://github.com/bluenviron/mediamtx
  backup_time: "12:00" # back up of polled data (e.g. CCDTemperature) and logs
