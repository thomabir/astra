name: Format and test

on: [push, pull_request]

jobs:
  run-test:
    strategy:
      matrix:
        python-version:
          - 3.11
        os: [ ubuntu-latest ]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv and set up Python version
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --locked --dev

      - name: Checks with pre-commit
        uses: pre-commit/action@v3.0.1

      - name: Detect tag push
        id: tag_check
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "is_tag=true" >> $GITHUB_OUTPUT
          else
            echo "is_tag=false" >> $GITHUB_OUTPUT
          fi

      - name: Test (fast — skip slow)
        if: ${{ github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/') }}
        run: |
          uv run --dev pytest -m "not slow"

      - name: Test (full — on tag pushes or when PR labeled)
        if: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-all-tests')) }}

        run: |
          uv run --dev pytest
