Telescope:
  - device_name: telescope_Callisto
    ip: localhost:11111
    device_number: 0
    alt_limit: -420
    pointing_threshold: 0.1 # arcmins
    guider:
      PIX2TIME: 
        '+x': 69.33
        '-x': 69.26
        '+y': 69.23
        '-y': 69.34
      RA_AXIS: 'x'
      DIRECTIONS:
        '+x': East
        '-x': West
        '+y': South
        '-y': North
      PID_COEFFS:
        'x': {'p': 0.70, 'i': 0.02, 'd': 0.0}
        'y': {'p': 0.50, 'i': 0.02, 'd': 0.0}
        'set_x': 0.0
        'set_y': 0.0
      WAIT_TIME: 10
Focuser:
  - device_name: focuser_Callisto
    ip: localhost:11111
    device_number: 0
    focus_pos: 6955
Camera:
  - device_name: camera_Callisto
    ip: localhost:11111
    device_number: 0
    temperature: -60
    flats:
      target_adu: [45000, 3000]
      bias_offset: 300
      lower_exptime_limit: 0.1
      upper_exptime_limit: 10
    paired_devices: 
      Telescope: telescope_Callisto
      Focuser: focuser_Callisto
      Dome: dome_Callisto
      FilterWheel: fw_Callisto
      ObservingConditions: weather_Callisto
      SafetyMonitor: safety_Callisto
Dome:
  - device_name: dome_Callisto
    ip: localhost:11111
    device_number: 0
FilterWheel:
  - device_name: fw_Callisto
    ip: localhost:11111 
    device_number: 0
ObservingConditions:
  - device_name: weather_Callisto
    ip: localhost:11111
    device_number: 0
SafetyMonitor:
  - device_name: safety_Callisto
    ip: localhost:11111
    device_number: 0
Misc:
  # Webcam: http://localhost:8888/inside
  backup_time: '12:00'