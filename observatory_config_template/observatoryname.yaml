Telescope:
  - device_name: telescope_observatoryname
    ip: localhost:11111
    device_number: 0
    pointing_threshold: 0.06 # arcmins
    guider:
      PIX2TIME:
        "+x": 69.32860207831231
        "-x": 69.05795081331794
        "+y": 69.32860207831231
        "-y": 69.32860207831231
      RA_AXIS: "y"
      DIRECTIONS:
        "+x": North
        "-x": South
        "+y": East
        "-y": West
      PID_COEFFS:
        "x": { "p": 0.70, "i": 0.02, "d": 0.0 }
        "y": { "p": 0.50, "i": 0.02, "d": 0.0 }
        "set_x": 0.0
        "set_y": 0.0
      WAIT_TIME: 10
Focuser:
  - device_name: focuser_observatoryname
    ip: localhost:11111
    device_number: 0
Camera:
  - device_name: camera_observatoryname
    ip: localhost:11111
    device_number: 0
    temperature: -60
    temperature_tolerance: 1
    flats:
      target_adu: [31500, 10500]
      bias_offset: 300
      lower_exptime_limit: 6
      upper_exptime_limit: 60
    paired_devices:
      Telescope: telescope_observatoryname
      Focuser: focuser_observatoryname
      Dome: dome_observatoryname
      FilterWheel: fw_observatoryname
      ObservingConditions: weather_observatoryname
      SafetyMonitor: safety_observatoryname
Dome:
  - device_name: dome_observatoryname
    ip: localhost:11111
    device_number: 0
FilterWheel:
  - device_name: fw_observatoryname
    ip: localhost:11111
    device_number: 0
ObservingConditions:
  - device_name: weather_observatoryname
    ip: localhost:11111
    device_number: 0
    closing_limits:
      Humidity:
        - min: 0
          max: 70
          max_safe_duration: 30
        - min: 0
          max: 80
          max_safe_duration: 150
        - min: 0
          max: 90
          max_safe_duration: 300
      WindSpeed:
        - min: 0
          max: 10
          max_safe_duration: 30
      SkyTemperature:
        - min: -999
          max: -30
          max_safe_duration: 30
        - min: -999
          max: -20
          max_safe_duration: 150
    opening_limits:
      Humidity:
        min: 0
        max: 65
      WindSpeed:
        min: 0
        max: 8
      SkyTemperature:
        min: -999
        max: -35
SafetyMonitor:
  - device_name: safety_observatoryname
    ip: localhost:11111
    device_number: 0
    max_safe_duration: 30

Misc:
  # Webcam: http://172.16.0.198:8888/inside
  backup_time: "12:00"
